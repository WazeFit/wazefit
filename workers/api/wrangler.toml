name = "wazefit-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# ── Deploy targets ──
routes = [
  { pattern = "api.wazefit.com/*", zone_name = "wazefit.com" }
]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "wazefit-db"
database_id = "b4688d85-9150-4f89-b2c4-b22543c797fd"

# ── KV Namespaces ──
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "b3a8d46cf5c64b4abedd0d0b4fc57400"

[[kv_namespaces]]
binding = "KV_TENANTS"
id = "4a34005c31214145b371fad7f1c91b56"

[[kv_namespaces]]
binding = "KV_JOBS"
id = "64ac02bd4b5a46b8bfef16ec46aa2eaf"

# ── R2 Buckets (habilitar R2 no Cloudflare Dashboard primeiro) ──
# Ativar em: dash.cloudflare.com > R2 Object Storage > Enable
# Depois descomentar e rodar: wrangler r2 bucket create wazefit-private && wrangler r2 bucket create wazefit-public
# [[r2_buckets]]
# binding = "R2_PRIVATE"
# bucket_name = "wazefit-private"

# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "wazefit-public"

# ── Queues (Producers) ──
[[queues.producers]]
binding = "QUEUE_NOTIFY"
queue = "wazefit-notifications"

[[queues.producers]]
binding = "QUEUE_LLM"
queue = "wazefit-llm-jobs"

[[queues.producers]]
binding = "QUEUE_EMAILS"
queue = "wazefit-emails"

[[queues.producers]]
binding = "QUEUE_WEBHOOKS"
queue = "wazefit-webhooks"

[vars]
ENVIRONMENT = "production"
CLOUDFLARE_PAGES_PROJECT = "wazefit"

# ── Secrets (configurar via: wrangler secret put <NOME> --name wazefit-api) ──
# JWT_SECRET
# ADMIN_SECRET
# ANTHROPIC_API_KEY
# SENDGRID_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# CLOUDFLARE_API_TOKEN
# CLOUDFLARE_ACCOUNT_ID
