name = "wazefit-tenant-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# ── Routes ──
# Captura TODOS os subdomínios *.wazefit.com
routes = [
  { pattern = "*.wazefit.com/*", zone_name = "wazefit.com" }
]

# ── KV: lookup de tenants para validar slug antes de fazer proxy ──
[[kv_namespaces]]
binding = "KV_TENANTS"
id = "4a34005c31214145b371fad7f1c91b56"

[vars]
ENVIRONMENT = "production"
